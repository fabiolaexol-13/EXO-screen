<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXO Lightstick Controller</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
        button { padding: 15px 30px; margin: 10px; border-radius: 10px; border: none; font-size: 16px; width: 80%; }
        #btn-conectar { background: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>EXO Lightstick Controller 🌟</h1>
    <p>Screening Especial: Baekhyun 'Lonsdaleite'</p>
    <div style="background: #222; padding: 20px; border-radius: 15px;">
        <h3>CONEXIÓN DE ASISTENTES</h3>
        <p>Enciende tu Pharynx en modo Bluetooth y presiona:</p>
        <button id="btn-conectar">🔗 Conectar mi EXO Lightstick</button>
        <p id="status-conexion">Estado: Esperando conexión...</p>
    </div>
    <div style="margin-top: 20px;">
        <h3>PANEL DE CONTROL GENERAL</h3>
        <button onclick="enviarColor('blanco')">Blanco Cosmico</button>
        <button onclick="enviarColor('rojo')" style="background:red;">Rojo</button>
        <button onclick="enviarColor('azul')" style="background:blue;">Azul</button>
        <button onclick="enviarColor('morado')" style="background:purple;">Morado</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
